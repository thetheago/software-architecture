services:
  nginx:
    image: nginx:1.27-alpine
    container_name: healthcheck-nginx
    ports:
      - "8081:80"
    volumes:
      - ./public:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build: .
    container_name: healthcheck-php
    volumes:
      - ./public:/var/www/html
    # php-fpm: cada conexao SSE segura um worker do pool ate o cliente desconectar.
