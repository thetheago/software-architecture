server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.html index.php;

    # Pagina estatica de status (o "estilo" da pagina).
    location / {
        try_files $uri $uri/ =404;
    }

    # Endpoint SSE. O segredo aqui e DESLIGAR todo buffering do nginx,
    # senao os eventos ficam presos ate a resposta "fechar".
    location = /stream.php {
        include        fastcgi_params;
        fastcgi_pass   php:9000;
        fastcgi_param  SCRIPT_FILENAME $document_root/stream.php;

        fastcgi_buffering off;      # nao acumula a resposta do php-fpm
        gzip off;                   # compressao quebraria o flush incremental
        chunked_transfer_encoding on;
        proxy_set_header Connection keep-alive;

        # Header lido pelo nginx para nao bufferizar (equivalente ao X-Accel-Buffering).
        add_header X-Accel-Buffering no;
    }

    # Demais scripts PHP (ex.: futuros endpoints de API).
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   php:9000;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
