; Configuracoes de PHP necessarias para Server-Sent Events funcionarem bem.
; (Sem implementacao aqui - apenas o ambiente pronto para o estudo.)

; Desliga o buffer de saida: cada echo/flush precisa ir direto pro cliente.
output_buffering = Off

; Sem timeout: a conexao SSE fica aberta indefinidamente enviando eventos.
max_execution_time = 0

; Comprimir a saida quebraria o flush incremental do stream.
zlib.output_compression = Off

; Bom para debug durante o estudo.
display_errors = On
error_reporting = E_ALL
