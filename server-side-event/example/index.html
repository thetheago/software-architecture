<!doctype html>
<meta charset="utf-8" />

<title>SSE + Redis</title>

<h1>Eventos (SSE)</h1>

<div id="log"></div>

<script>

  const eventSource = new EventSource("http://localhost:8080/stream");

  eventSource.onmessage = function(event) {
    document.getElementById("log").innerHTML = event.data
  }
